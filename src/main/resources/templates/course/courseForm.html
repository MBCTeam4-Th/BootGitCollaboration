<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8" /><title>강의 등록</title></head>
<body>
<h1>강의 등록폼</h1>

<div th:if="${errorMessage}" style="color:red" th:text="${errorMessage}"></div>

<form action="/admin/course/new" method="post" enctype="multipart/form-data">
    <!-- CSRF: name은 하드코딩, value만 조건부 -->
    <input type="hidden" name="_csrf" th:if="${_csrf != null}" th:value="${_csrf.token}"/>

    <div>
        <label>강의명 *</label>
        <input type="text" name="courseName" required/>
    </div>

    <div>
        <label>강의설명</label>
        <textarea name="courseDescription"></textarea>
    </div>

    <div>
        <label>수강료</label>
        <input type="number" name="courseFee"/>
    </div>

    <div>
        <label>모집상태</label>
        <select name="intemSellStatus">
            <option value="order">order</option>
            <option value="cancel">cancel</option>
        </select>
    </div>

    <div>
        <label>최대 수강인원</label>
        <input type="number" name="maxEnrollment"/>
    </div>

    <div>
        <label>강의 이미지(첫번째 필수)</label>
        <input type="file" name="courseImgFile" multiple/>
    </div>

    <button type="submit">등록</button>
</form>
</body>
</html>
