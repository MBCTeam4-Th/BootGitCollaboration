<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>강좌 상세</title></head>
<body>
<h1 th:text="${response.courseDetail.courseName}">강좌명</h1>

<table border="1" cellpadding="8" cellspacing="0">
    <tr>
        <th>강좌ID</th>
        <td th:text="${response.courseDetail.courseId}">0</td>
    </tr>
    <tr>
        <th>수강료</th>
        <td th:text="${response.courseDetail.courseFee}">0</td>
    </tr>
    <tr>
        <th>상태</th>
        <td th:text="${response.courseDetail.intemSellStatus}">order</td>
    </tr>
    <tr>
        <th>최대 인원</th>
        <td th:text="${response.courseDetail.maxEnrollment}">0</td>
    </tr>
    <tr>
        <th>설명</th>
        <td th:text="${response.courseDetail.courseDescription}">설명</td>
    </tr>
</table>

<!-- 대표 이미지 -->
<h3>대표 이미지</h3>
<div th:if="${response.courseDetail.mainImageUrl != null}">
    <img th:src="${response.courseDetail.mainImageUrl}" alt="대표" style="max-width:300px"/>
</div>
<div th:if="${response.courseDetail.mainImageUrl == null}">
    <em>대표 이미지가 없습니다.</em>
</div>

<!-- 모든 이미지 썸네일 -->
<h3>이미지 목록</h3>
<div th:if="${response.courseImgs != null and #lists.size(response.courseImgs) > 0}">
    <div th:each="img : ${response.courseImgs}" style="display:inline-block;margin:6px">
        <img th:src="${img.imgUrl}" alt="" style="max-width:120px; max-height:120px; display:block;"/>
        <small th:text="${img.imgName}">filename</small>
        <div th:if="${img.mainImgYn}"><strong>(대표)</strong></div>
    </div>
</div>
<div th:if="${response.courseImgs == null or #lists.size(response.courseImgs) == 0}">
    <em>등록된 이미지가 없습니다.</em>
</div>

<hr/>

<!-- 액션 버튼들 -->
<p style="display:flex; gap:10px;">
    <!-- 수정 폼으로 -->
    <a th:href="@{'/admin/course/' + ${response.courseDetail.courseId} + '/modify'}">수정</a>

    <!-- 삭제 POST (CSRF 포함) -->
<form th:action="@{'/admin/course/' + ${response.courseDetail.courseId} + '/delete'}" method="post" style="display:inline;">
 <!--   <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->
    <button type="submit" onclick="return confirm('정말 삭제하시겠습니까?');">삭제</button>
</form>

<!-- 목록으로 -->
<a th:href="@{/admin/course/list}">목록</a>
</p>

</body>
</html>
