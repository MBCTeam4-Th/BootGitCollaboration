<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메인 | 온라인 강의실</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>
<div class="navbar">
    <a href="/" style="font-size:1.18em">온라인 강의실</a>

    <!-- 상단 네비 (필요시 유지) -->
    <a href="/admin/course/list">관리자 강의목록</a>
    <a href="/student/courses/list">학생 강의목록</a>
    <a href="/student/signup">회원가입</a>
</div>

<div class="main-container">
    <h1>온라인 강의 홈페이지</h1>
    <div class="quick-actions">
        <a class="btn" href="/admin/course/list">관리자 강의목록</a>
        <a class="btn" href="/student/courses/list">학생 강의목록</a>
        <a class="btn" href="/admin/course/new">강의 추가</a>
        <a class="btn" href="/student/signup">회원가입</a>
    </div>
</div>

<!-- 카드 그리드 -->
<div class="container">
    <div class="card-grid">
        <!-- 관리자 영역 -->
        <a class="card" href="/admin/course/list">
            <div class="card-title">관리자 강의</div>
            <div class="card-desc">강의 추가/목록/상세/수정/삭제 관리</div>
        </a>

        <!-- 학생 영역 -->
        <a class="card" href="/student/courses/list">
            <div class="card-title">학생 강의</div>
            <div class="card-desc">강의 목록 및 상세 보기</div>
        </a>

        <!-- 장바구니 -->
        <a class="card" href="/student/cart">
            <div class="card-title">장바구니</div>
            <div class="card-desc">담은 강좌 확인 및 결제 단계 이동</div>
        </a>

        <!-- 수강내역(Enrollment) -->
        <a class="card" href="/student/enrollments">
            <div class="card-title">수강 내역</div>
            <div class="card-desc">신청한 강좌 상태 및 진행 현황</div>
        </a>
    </div>
</div>

</body>
</html>
